{% extends 'base.html' %}
{% block content %}
<div class="section" style="max-width: 680px; margin: 0 auto;">
    <div class="card">
        <div class="card-head">
            <h3 class="card-title">Password required</h3>
            <span class="pill">{{ filename }}</span>
        </div>
        <div class="card-body">
            <p class="muted-block">This file belongs to <strong>{{ owner }}</strong> and is protected by a password.</p>
            <form method="post" action="{{ url_for('verify_password') }}">
                <input type="hidden" name="storage_key" value="{{ storage_key }}">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter file password">
                </div>
                <div class="btn-row">
                    <button class="btn" type="submit">Unlock file</button>
                    {% if token %}
                        <a class="btn secondary" href="{{ url_for('share_file', token=token) }}">Back</a>
                    {% else %}
                        <a class="btn secondary" href="{{ url_for('index') }}">Back</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
