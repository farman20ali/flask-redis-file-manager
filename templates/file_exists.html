{% extends 'base.html' %}
{% block content %}
<div class="section" style="max-width: 760px; margin: 0 auto;">
    <div class="card">
        <div class="card-head">
            <h3 class="card-title">File already exists</h3>
            <span class="pill">{{ filename }}</span>
        </div>
        <div class="card-body">
            <p class="muted-block">A file named <strong>{{ filename }}</strong> already exists for this owner. Choose what to do next.</p>
            <div class="grid cols-2" style="margin-top: 18px;">
                <form method="post" action="{{ url_for('overwrite') }}">
                    <input type="hidden" name="send_to" value="{{ send_to }}">
                    <input type="hidden" name="filename" value="{{ filename }}">
                    <input type="hidden" name="encoded_data" value="{{ encoded_data }}">
                    <input type="hidden" name="expiry_at" value="{{ expiry_at }}">
                    <input type="hidden" name="file_password" value="{{ file_password }}">
                    <input type="hidden" name="visibility" value="{{ visibility }}">
                    <button type="submit" class="btn danger" style="width: 100%;">Overwrite</button>
                </form>
                <form method="post" action="{{ url_for('rename') }}">
                    <input type="hidden" name="send_to" value="{{ send_to }}">
                    <input type="hidden" name="encoded_data" value="{{ encoded_data }}">
                    <input type="hidden" name="expiry_at" value="{{ expiry_at }}">
                    <input type="hidden" name="file_password" value="{{ file_password }}">
                    <input type="hidden" name="visibility" value="{{ visibility }}">
                    <div class="field">
                        <label for="new_filename">Rename to</label>
                        <input type="text" id="new_filename" name="new_filename" placeholder="New filename">
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Rename</button>
                </form>
            </div>
            <div class="btn-row" style="margin-top: 18px;">
                <a class="btn secondary" href="{{ url_for('index') }}">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
